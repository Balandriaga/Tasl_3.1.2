<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Form</title>
</head>
<body>
<h2 th:text="${user.id == null ? 'Create User' : 'Edit User'}"></h2>
<form th:action="${user.id == null ? '/admin/users' : '/admin/update/' + user.id}" th:object="${user}" method="post">
  <input type="hidden" name="_method" th:if="${user.id != null}" value="patch">

  <label for="name">Name:</label>
  <input type="text" id="name" th:field="*{username}" required>
  <br>

  <label for="age">Age:</label>
  <input type="number" id="age" th:field="*{age}" required>
  <br>

  <label for="password">Password:</label>
  <input type="password" id="password" th:field="*{password}" required>
  <br>

  <label for="roles">Roles:</label>
  <select id="roles" th:field="*{roles}" multiple>
    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
  </select>
  <br>

  <button type="submit">Save</button>
</form>
<br>
<a href="/admin/users">Back to User List</a>
</body>
</html>
